# ============================================================================
#  .github/workflows/build.yml — Build Holaf-Mix inside a throwaway Arch
#  container, then upload the result as a downloadable artifact.
# ============================================================================
#  Triggers:
#    - Push to main / any branch (smoke test that it still builds)
#    - Manual trigger from the Actions tab
#    - Tag push matching v* (creates a versioned release-ready artifact)
#
#  Why Arch?
#    Holaf-Mix targets CachyOS / Arch Linux (the user's primary platform).
#    Building on the same distro family as the target means the resulting
#    binary links against the right glibc, libpipewire, libpulse, etc.
#
#  Why a container?
#    - GitHub's `ubuntu-latest` runner doesn't have pacman; we use a
#      privileged container with `archlinux:latest` so we get a real Arch
#      environment, with no risk of polluting the host runner.
#    - The container is destroyed at the end of the job. Nothing persists
#      on GitHub's side except the uploaded artifact.
#
#  Output:
#    - holaf-mix-{ref}-{arch}.tar.gz  (the distributable bundle)
#    - holaf-mix-onedir-{ref}-{arch}.zip (alternative fast-launch build)
#    - SHA256SUMS (checksums for verification)
# ============================================================================

name: Build Holaf-Mix

on:
  push:
    branches: ['**']
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      mode:
        description: 'Build mode'
        required: true
        type: choice
        default: 'onefile'
        options:
          - onefile
          - onedir
          - both

# Avoid running two builds at once for the same ref
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build on Arch Linux
    runs-on: ubuntu-latest
    # Privileged is required for pacman in nested container setups
    container:
      image: archlinux:latest
      options: --privileged --init
    timeout-minutes: 30

    env:
      # Skip the safety guard inside the CI container (no display, no host)
      HOLAF_BUILD_INSTALL_DEPS: '1'
      DEBIAN_FRONTEND: noninteractive

    steps:
      # ------------------------------------------------------------------
      # 0. Setup
      # ------------------------------------------------------------------
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Display environment info
        # Note: this is a best-effort diagnostic. The base archlinux:latest
        # image doesn't ship python3, so we tolerate its absence here —
        # python is installed in the next step.
        run: |
          echo "::group::Environment"
          uname -a
          cat /etc/os-release
          pacman --version | head -1 || echo "(no pacman)"
          command -v python3 >/dev/null && python3 --version || echo "(python3 not yet installed)"
          echo "::endgroup::"

      # ------------------------------------------------------------------
      # 1. Install system dependencies (Arch inside the container)
      # ------------------------------------------------------------------
      - name: Refresh package database
        run: |
          pacman -Sy --noconfirm

      - name: Install build dependencies
        run: |
          # --noconfirm is safe in CI: no interactive prompts
          #
          # python-rtmidi builds C++ bindings for JACK and ALSA, so we
          # need the dev headers (pkg-config .pc files) for both.
          #
          # sounddevice links against PortAudio at *import* time (not just
          # build time), so we need the shared lib too.
          # base-devel pulls in gcc/g++/make/pkgconf which are also needed.
          pacman -S --noconfirm --needed \
            base-devel \
            pkgconf \
            git \
            librsvg \
            imagemagick \
            python \
            python-pip \
            jack2 \
            alsa-lib \
            portaudio

          # Arch's `python` package provides /usr/bin/python3; verify
          # before continuing, otherwise the next step fails with a
          # confusing "command not found".
          if ! command -v python3 >/dev/null; then
            echo "::error::python3 not found after installing 'python' package."
            echo "::error::Check that pacman succeeded and PATH includes /usr/bin."
            ls -la /usr/bin/python* 2>/dev/null || true
            exit 1
          fi
          python3 --version

      - name: Install Python build dependencies
        # Use a venv instead of --break-system-packages. On Arch, the
        # system `python3` and the system `pip` (from python-pip) can
        # drift apart in subtle ways; a venv guarantees that imports
        # work in the same interpreter that pip wrote to.
        run: |
          set -e
          python3 -m venv /opt/holaf-venv
          # shellcheck disable=SC1091
          source /opt/holaf-venv/bin/activate

          # Sanity: venv python should be the one we're using
          echo "Using: $(which python3) ($(python3 --version))"
          echo "Site-packages: $(python3 -c 'import site; print(site.getsitepackages())')"

          python3 -m pip install --no-cache-dir --upgrade pip
          python3 -m pip install --no-cache-dir \
            pyinstaller \
            PySide6 \
            sounddevice \
            numpy \
            mido \
            python-rtmidi

          # Verify all packages import in THIS venv. If this passes,
          # build.sh's check_deps will pass too.
          echo "::group::Verifying imports"
          python3 -c "
          import importlib
          for mod in ('PySide6', 'sounddevice', 'numpy', 'mido', 'rtmidi', 'PyInstaller'):
              try:
                  importlib.import_module(mod)
                  print(f'  OK   {mod}')
              except ImportError as e:
                  print(f'  FAIL {mod}: {e}')
                  raise SystemExit(1)
          "
          echo "::endgroup::"

      # ------------------------------------------------------------------
      # 2. Build (using the project's own build.sh, with safety bypass)
      # ------------------------------------------------------------------
      - name: Build (onefile)
        if: ${{ github.event.inputs.mode != 'onedir' && github.event.inputs.mode != 'both' || github.event.inputs.mode == '' }}
        run: |
          # Activate the venv so the same python3 that has the packages
          # is the one build.sh calls.
          # shellcheck disable=SC1091
          source /opt/holaf-venv/bin/activate
          chmod +x build.sh assets/icons/build_icons.sh
          ./build.sh --tarball
        env:
          # Build inside the CI container: bypass the host-install guards.
          HOLAF_BUILD_INSTALL_DEPS: '1'

      - name: Build (onedir, fast launch)
        if: ${{ github.event.inputs.mode == 'onedir' || github.event.inputs.mode == 'both' }}
        run: |
          chmod +x build.sh assets/icons/build_icons.sh
          ./build.sh --onedir --tarball
        env:
          HOLAF_BUILD_INSTALL_DEPS: '1'

      # ------------------------------------------------------------------
      # 3. Verify the binary actually runs (smoke test)
      # ------------------------------------------------------------------
      - name: Smoke test — binary well-formed
        run: |
          chmod +x dist/holaf-mix || true
          # Verify it's a valid ELF executable
          file dist/holaf-mix
          ls -lh dist/holaf-mix
          # Strip the binary to shave off ~30% on a real release
          strip dist/holaf-mix 2>/dev/null || true

      - name: Smoke test — bundled modules present in binary
        # Best-effort sanity check. We can't actually RUN the binary
        # (no X11 in CI, no PipeWire, no audio device), so this just
        # verifies the ELF is valid and the bundle size is sensible.
        # Hidden-import issues will surface when the user actually runs
        # the binary on their desktop.
        continue-on-error: true
        run: |
          # 1. The binary is a valid ELF
          file dist/holaf-mix

          # 2. Size sanity check (PyInstaller + PySide6 should be 50-150 MB)
          size_bytes=$(stat -c%s dist/holaf-mix)
          size_mb=$((size_bytes / 1024 / 1024))
          echo "Binary size: ${size_mb} MB"
          if [[ $size_mb -lt 30 ]]; then
            echo "::warning::Binary is suspiciously small (<30 MB). Hidden imports might be missing."
          fi
          if [[ $size_mb -gt 300 ]]; then
            echo "::warning::Binary is suspiciously large (>300 MB). Bundling might be excessive."
          fi

          # 3. Check that the binary embeds Python + PyInstaller markers
          if strings dist/holaf-mix | grep -q "PyInstaller"; then
            echo "  OK   PyInstaller bootloader present"
          else
            echo "  FAIL PyInstaller bootloader not found"
          fi
          if strings dist/holaf-mix | grep -q "PySide6"; then
            echo "  OK   PySide6 strings present in bundle"
          else
            echo "  WARN PySide6 strings not found (may be compressed)"
          fi

      # ------------------------------------------------------------------
      # 4. Compute checksums
      # ------------------------------------------------------------------
      - name: Generate checksums
        if: ${{ hashFiles('dist/*.tar.gz') != '' }}
        run: |
          cd dist
          sha256sum *.tar.gz > SHA256SUMS
          cat SHA256SUMS

      # ------------------------------------------------------------------
      # 5. Upload artifacts
      # ------------------------------------------------------------------
      - name: Upload tarball
        uses: actions/upload-artifact@v4
        with:
          name: holaf-mix-${{ github.sha }}-${{ runner.arch }}
          path: |
            dist/*.tar.gz
            dist/SHA256SUMS
          if-no-files-found: error
          retention-days: 30

  # ======================================================================
  # Optional: build a .deb / .rpm in a second job (skipped for now, kept
  # as a placeholder for when the user wants Linux distro packages).
  # ======================================================================
