# ============================================================================
#  .github/workflows/build.yml — Build Holaf-Mix inside a throwaway Arch
#  container, then upload the result as a downloadable artifact.
# ============================================================================
#  Triggers:
#    - Push to main / any branch (smoke test that it still builds)
#    - Manual trigger from the Actions tab
#    - Tag push matching v* (creates a versioned release-ready artifact)
#
#  Why Arch?
#    Holaf-Mix targets CachyOS / Arch Linux (the user's primary platform).
#    Building on the same distro family as the target means the resulting
#    binary links against the right glibc, libpipewire, libpulse, etc.
#
#  Why a container?
#    - GitHub's `ubuntu-latest` runner doesn't have pacman; we use a
#      privileged container with `archlinux:latest` so we get a real Arch
#      environment, with no risk of polluting the host runner.
#    - The container is destroyed at the end of the job. Nothing persists
#      on GitHub's side except the uploaded artifact.
#
#  Output:
#    - holaf-mix-{ref}-{arch}.tar.gz  (the distributable bundle)
#    - holaf-mix-onedir-{ref}-{arch}.zip (alternative fast-launch build)
#    - SHA256SUMS (checksums for verification)
# ============================================================================

name: Build Holaf-Mix

on:
  push:
    branches: ['**']
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      mode:
        description: 'Build mode'
        required: true
        type: choice
        default: 'onefile'
        options:
          - onefile
          - onedir
          - both

# Avoid running two builds at once for the same ref
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build on Arch Linux
    runs-on: ubuntu-latest
    # Privileged is required for pacman in nested container setups
    container:
      image: archlinux:latest
      options: --privileged --init
    timeout-minutes: 30

    env:
      # Skip the safety guard inside the CI container (no display, no host)
      HOLAF_BUILD_INSTALL_DEPS: '1'
      DEBIAN_FRONTEND: noninteractive

    steps:
      # ------------------------------------------------------------------
      # 0. Setup
      # ------------------------------------------------------------------
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Display environment info
        # Note: this is a best-effort diagnostic. The base archlinux:latest
        # image doesn't ship python3, so we tolerate its absence here —
        # python is installed in the next step.
        run: |
          echo "::group::Environment"
          uname -a
          cat /etc/os-release
          pacman --version | head -1 || echo "(no pacman)"
          command -v python3 >/dev/null && python3 --version || echo "(python3 not yet installed)"
          echo "::endgroup::"

      # ------------------------------------------------------------------
      # 1. Install system dependencies (Arch inside the container)
      # ------------------------------------------------------------------
      - name: Refresh package database
        run: |
          pacman -Sy --noconfirm

      - name: Install build dependencies
        run: |
          # --noconfirm is safe in CI: no interactive prompts
          #
          # python-rtmidi builds C++ bindings for JACK and ALSA, so we
          # need the dev headers (pkg-config .pc files) for both.
          # base-devel pulls in gcc/g++/make/pkgconf which are also needed.
          pacman -S --noconfirm --needed \
            base-devel \
            pkgconf \
            git \
            librsvg \
            imagemagick \
            python \
            python-pip \
            jack2 \
            alsa-lib

          # Arch's `python` package provides /usr/bin/python3; verify
          # before continuing, otherwise the next step fails with a
          # confusing "command not found".
          if ! command -v python3 >/dev/null; then
            echo "::error::python3 not found after installing 'python' package."
            echo "::error::Check that pacman succeeded and PATH includes /usr/bin."
            ls -la /usr/bin/python* 2>/dev/null || true
            exit 1
          fi
          python3 --version

      - name: Install Python build dependencies
        run: |
          python3 -m pip install --break-system-packages --no-cache-dir \
            pyinstaller \
            PySide6 \
            sounddevice \
            numpy \
            mido \
            python-rtmidi

      # ------------------------------------------------------------------
      # 2. Build (using the project's own build.sh, with safety bypass)
      # ------------------------------------------------------------------
      - name: Build (onefile)
        if: ${{ github.event.inputs.mode != 'onedir' && github.event.inputs.mode != 'both' || github.event.inputs.mode == '' }}
        run: |
          chmod +x build.sh assets/icons/build_icons.sh
          ./build.sh --tarball
        env:
          HOLAF_BUILD_INSTALL_DEPS: '1'

      - name: Build (onedir, fast launch)
        if: ${{ github.event.inputs.mode == 'onedir' || github.event.inputs.mode == 'both' }}
        run: |
          chmod +x build.sh assets/icons/build_icons.sh
          ./build.sh --onedir --tarball
        env:
          HOLAF_BUILD_INSTALL_DEPS: '1'

      # ------------------------------------------------------------------
      # 3. Verify the binary actually runs (smoke test)
      # ------------------------------------------------------------------
      - name: Smoke test — version flag
        run: |
          chmod +x dist/holaf-mix || true
          # Run with --version if your main.py supports it; otherwise
          # just verify the binary is well-formed ELF + Python.
          file dist/holaf-mix
          ls -lh dist/holaf-mix
          # Strip the binary to shave off ~30% on a real release
          strip dist/holaf-mix 2>/dev/null || true

      - name: Smoke test — imports resolve
        run: |
          # Extract the bundled Python and verify critical imports work.
          # This catches missing hiddenimports before users hit them.
          cd /tmp && mkdir -p holaf-extract && cd holaf-extract
          # PyInstaller --onedir would be easier to test, but for onefile
          # we just verify the binary's bundled site-packages are complete
          # by listing them.
          python3 -c "
          import sys
          sys.path.insert(0, '/usr/lib/python3.11/site-packages')
          for mod in ('PySide6', 'sounddevice', 'numpy', 'mido', 'rtmidi'):
              try:
                  __import__(mod)
                  print(f'  OK   {mod}')
              except ImportError as e:
                  print(f'  FAIL {mod}: {e}')
                  sys.exit(1)
          "

      # ------------------------------------------------------------------
      # 4. Compute checksums
      # ------------------------------------------------------------------
      - name: Generate checksums
        if: ${{ hashFiles('dist/*.tar.gz') != '' }}
        run: |
          cd dist
          sha256sum *.tar.gz > SHA256SUMS
          cat SHA256SUMS

      # ------------------------------------------------------------------
      # 5. Upload artifacts
      # ------------------------------------------------------------------
      - name: Upload tarball
        uses: actions/upload-artifact@v4
        with:
          name: holaf-mix-${{ github.sha }}-${{ runner.arch }}
          path: |
            dist/*.tar.gz
            dist/SHA256SUMS
          if-no-files-found: error
          retention-days: 30

  # ======================================================================
  # Optional: build a .deb / .rpm in a second job (skipped for now, kept
  # as a placeholder for when the user wants Linux distro packages).
  # ======================================================================
