<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" role="img" aria-label="Holaf-Mix">
  <title>Holaf-Mix</title>
  <desc>Audio mixer strip — two faders with caps, rotary knob, status LEDs.</desc>

  <defs>
    <!-- Strip body: dark gradient matching the app's INPUT/OUTPUT panels -->
    <linearGradient id="body" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#2b2b2b"/>
      <stop offset="100%" stop-color="#1a1a1a"/>
    </linearGradient>

    <!-- Blue accent (matches INPUT strip in main_window) -->
    <linearGradient id="faderL" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#3daee9"/>
      <stop offset="100%" stop-color="#2080b8"/>
    </linearGradient>

    <!-- Red accent (matches OUTPUT strip in main_window) -->
    <linearGradient id="faderR" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#e93d3d"/>
      <stop offset="100%" stop-color="#b82828"/>
    </linearGradient>

    <!-- Purple (matches VIRTUAL BUS) -->
    <radialGradient id="knob" cx="0.35" cy="0.35" r="0.7">
      <stop offset="0%"  stop-color="#c39bd3"/>
      <stop offset="60%" stop-color="#9b59b6"/>
      <stop offset="100%" stop-color="#6c3a82"/>
    </radialGradient>

    <!-- Subtle inner shadow for depth -->
    <filter id="innerShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2"/>
      <feOffset dx="0" dy="1" result="offsetblur"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.5"/></feComponentTransfer>
      <feComposite in2="SourceAlpha" operator="arithmetic" k2="-1" k3="1" result="shadowDiff"/>
      <feComposite in2="SourceGraphic" operator="atop"/>
    </filter>

    <!-- Glow for LEDs -->
    <filter id="ledGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="1.5" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- ================== Strip body ================== -->
  <rect x="28" y="16" width="200" height="224" rx="18" ry="18"
        fill="url(#body)" stroke="#0a0a0a" stroke-width="2"/>

  <!-- Top header bar -->
  <rect x="28" y="16" width="200" height="30" rx="18" ry="18" fill="#0d0d0d"/>
  <rect x="28" y="32" width="200" height="14" fill="#0d0d0d"/>

  <!-- Three small status dots in header (mono/mute/recording vibe) -->
  <circle cx="50"  cy="31" r="4" fill="#2ecc71" filter="url(#ledGlow)"/>
  <circle cx="66"  cy="31" r="4" fill="#f39c12"/>
  <circle cx="82"  cy="31" r="4" fill="#555"/>

  <!-- ================== Knob (top) ================== -->
  <!-- Outer ring (subtle) -->
  <circle cx="128" cy="78" r="28" fill="#0a0a0a"/>
  <!-- Knob body -->
  <circle cx="128" cy="78" r="24" fill="url(#knob)" stroke="#1a1a1a" stroke-width="1.5"/>
  <!-- Position indicator (notch) -->
  <rect x="125.5" y="58" width="5" height="10" rx="1.5" fill="#1a1a1a"/>
  <!-- Center cap (glossy highlight) -->
  <circle cx="128" cy="78" r="6" fill="#1a1a1a"/>
  <circle cx="126" cy="76" r="2" fill="#5d5d5d" opacity="0.6"/>

  <!-- ================== Faders (left and right) ================== -->
  <!-- Fader tracks (groove) -->
  <rect x="76"  y="120" width="8" height="80" rx="2" fill="#0a0a0a"/>
  <rect x="172" y="120" width="8" height="80" rx="2" fill="#0a0a0a"/>

  <!-- Fader rails (filled portion above cap, suggesting level) -->
  <rect x="76"  y="120" width="8" height="32" rx="2" fill="url(#faderL)" opacity="0.45"/>
  <rect x="172" y="120" width="8" height="48" rx="2" fill="url(#faderR)" opacity="0.45"/>

  <!-- Fader caps (the sliders) -->
  <rect x="64"  y="148" width="32" height="20" rx="4" fill="#f0f0f0" stroke="#0a0a0a" stroke-width="1.5"/>
  <rect x="160" y="164" width="32" height="20" rx="4" fill="#f0f0f0" stroke="#0a0a0a" stroke-width="1.5"/>
  <!-- Cap grip lines -->
  <line x1="72"  y1="158" x2="88"  y2="158" stroke="#888" stroke-width="1.2"/>
  <line x1="72"  y1="153" x2="88"  y2="153" stroke="#aaa" stroke-width="1"/>
  <line x1="72"  y1="163" x2="88"  y2="163" stroke="#aaa" stroke-width="1"/>
  <line x1="168" y1="174" x2="184" y2="174" stroke="#888" stroke-width="1.2"/>
  <line x1="168" y1="169" x2="184" y2="169" stroke="#aaa" stroke-width="1"/>
  <line x1="168" y1="179" x2="184" y2="179" stroke="#aaa" stroke-width="1"/>

  <!-- ================== Status LEDs (bottom) ================== -->
  <rect x="64"  y="212" width="20" height="14" rx="2" fill="#0a0a0a"/>
  <rect x="172" y="212" width="20" height="14" rx="2" fill="#0a0a0a"/>
  <circle cx="74"  cy="219" r="4" fill="#2ecc71" filter="url(#ledGlow)"/>
  <circle cx="182" cy="219" r="4" fill="#3daee9" filter="url(#ledGlow)"/>

  <!-- ================== "H" mark (bottom) ================== -->
  <g transform="translate(128, 230)" font-family="DejaVu Sans, Verdana, sans-serif"
     font-weight="bold" font-size="12" fill="#888" text-anchor="middle">
    <text>H</text>
  </g>
</svg>
